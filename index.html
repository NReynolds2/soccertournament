

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Single Page – Static + Google Sheets CSV</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header" role="banner">
    <div class="logo-wrap">
      <img class="logo" src="assets/logo.png" alt="Site logo" />
    </div>
    <h1 class="site-title">Project Title</h1>
  </header>

  <main id="main" class="container" tabindex="-1">
    <section class="card" id="about">
      <h2>ABOUT</h2>

      <p>This single-page site uses a stronger, Impact-like font for headings and body text.</p>
    </section>

    <section class="card" id="schedule">
      <h2>SCHEDULE</h2>
      <div id="schedule-status" class="status"></div>
      <div class="table-container">
        <table id="schedule-table" class="table table-striped"></table>
      </div>
    </section>

    <section class="card" id="sheet">
      <h2>Live Data (Google Sheets CSV)</h2>
      <p class="muted">This table is loaded from a Google Sheets CSV.</p>
      <div id="sheet-status" class="status"></div>
      <div class="table-container">
        <table id="sheet-table" class="table table-striped"></table>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <small>© <span id="year"></span> Your Name or Organization</small>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
